<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 메인 대시보드</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <!-- Background Trendy Elements -->
    <div class="bg-blob blob-1" style="top: -20%; right: -10%; opacity: 0.3;"></div>
    <div class="bg-blob blob-2" style="bottom: -20%; left: -10%; opacity: 0.3;"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-heart"></i>
            <span>Blind Date</span>
        </a>
        <div class="nav-profile">
            <a href="admin.html" id="adminMenuLink" class="admin-link" style="display: none; font-size: 0.8rem; color: #ffce00; margin-right: 15px; text-decoration: none; font-weight: bold;"><i class="ph-fill ph-crown"></i> 관리자 페이지</a>
            <span id="welcomeName" class="user-greeting">사용자님</span>
            <button id="logoutBtn" class="btn-icon" title="로그아웃"><i class="ph ph-sign-out"></i></button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        
        <!-- Welcome Section -->
        <header class="dashboard-header">
            <h1 id="mainTitle" class="page-title">프로필을 등록해주세요 <span class="title-accent">✨</span></h1>
            <p id="mainSubtitle" class="page-subtitle">매력적인 프로필은 성공적인 매칭의 첫걸음입니다.</p>
        </header>

        <!-- Feature Cards Grid -->
        <div class="dashboard-grid">
            
            <!-- 1. 인연 탐색 카드 -->
            <div class="feature-card">
                <div>
                    <div class="card-icon"><i class="ph-fill ph-sparkle"></i></div>
                    <div class="card-content">
                        <h3>새로운 인연 찾기</h3>
                        <p>나와 잘 어울리는 상대를 탐색하고 신청 현황을 확인하세요.</p>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; width: 100%;">
                    <button id="btnFindDate" class="btn-action" onclick="window.location.href='find_date.html'" style="flex: 1;">인연 찾기</button>
                    <button id="btnMatchStatus" class="btn-action secondary" onclick="window.location.href='match_status.html'" style="flex: 1;">신청 관리</button>
                </div>
            </div>

            <!-- 2. 프로필 관리 카드 -->
            <div class="feature-card">
                <div>
                    <div class="card-icon"><i class="ph-fill ph-user-circle"></i></div>
                    <div class="card-content">
                        <h3 id="profileCardTitle">내 프로필 관리</h3>
                        <p id="profileCardDesc">나의 매력을 보여줄 수 있는 프로필을 관리하세요.</p>
                    </div>
                </div>
                <div id="profileActionArea" style="display: flex; gap: 12px; width: 100%;">
                    <button class="btn-action" onclick="window.location.href='profile.html'">프로필 등록하기</button>
                </div>
            </div>

        </div>

    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
