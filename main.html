<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 메인 대시보드</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <!-- Background Trendy Elements (Slightly adjusted for main page) -->
    <div class="bg-blob blob-1" style="top: -20%; right: -10%; opacity: 0.3;"></div>
    <div class="bg-blob blob-2" style="bottom: -20%; left: -10%; opacity: 0.3;"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-heart"></i>
            <span>Blind Date</span>
        </a>
        <div class="nav-profile">
            <a href="admin.html" id="adminMenuLink" class="admin-link" style="display: none; font-size: 0.8rem; color: #ffce00; margin-right: 15px; text-decoration: none; font-weight: bold;"><i class="ph-fill ph-crown"></i> 관리자 페이지</a>
            <span id="welcomeName" class="user-greeting">사용자님</span>
            <button id="logoutBtn" class="btn-icon" title="로그아웃"><i class="ph ph-sign-out"></i></button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        
        <!-- Welcome Section -->
        <header class="dashboard-header">
            <h1 class="page-title">프로필을 등록해주세요 ✨</h1>
            <p class="page-subtitle">매력적인 프로필은 성공적인 매칭의 첫걸음입니다.</p>
        </header>

        <!-- Feature Cards Grid -->
        <div class="dashboard-grid">
            <!-- 1. 인연 탐색 영역 -->
            <div class="feature-card primary-card" style="background: linear-gradient(135deg, #FF4D6D 0%, #FF8A5B 100%); border: none; cursor: pointer;" onclick="window.location.href='find_date.html'">
                <div class="card-icon" style="background: white; color: #FF4D6D;"><i class="ph-fill ph-magnifying-glass"></i></div>
                <div class="card-content">
                    <h3 style="color: white;">인연 찾으러 가기</h3>
                    <p style="color: rgba(255,255,255,0.85);">나와 딱 맞는 새로운 인연을 탐색해 보세요.</p>
                </div>
            </div>

            <div class="feature-card" style="cursor: pointer; border: 1px solid rgba(255,255,255,0.1);" onclick="window.location.href='match_status.html'">
                <div class="card-icon" style="background: rgba(255,77,109,0.1); color: #FF4D6D;"><i class="ph-fill ph-heart-straight"></i></div>
                <div class="card-content">
                    <h3>매칭 신청 관리</h3>
                    <p>내가 보낸 신청과 받은 신청 내역을 확인하세요.</p>
                </div>
            </div>

            <!-- 2. 프로필 관리 영역 -->
            <div class="feature-card" style="margin-top: 10px;">
                <div class="card-icon"><i class="ph-fill ph-user-circle"></i></div>
                <div class="card-content">
                    <h3 id="profileCardTitle">내 프로필 관리</h3>
                    <p id="profileCardDesc">나의 매력을 보여줄 수 있는 프로필을 관리하세요.</p>
                </div>
                <div id="profileActionArea" style="display: flex; gap: 10px; width: 100%;">
                    <button class="btn-action" onclick="window.location.href='profile.html'">프로필 등록하기</button>
                </div>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
