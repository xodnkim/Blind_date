<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 메인 대시보드</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <!-- Background Trendy Elements (Slightly adjusted for main page) -->
    <div class="bg-blob blob-1" style="top: -20%; right: -10%; opacity: 0.3;"></div>
    <div class="bg-blob blob-2" style="bottom: -20%; left: -10%; opacity: 0.3;"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-heart"></i>
            <span>Blind Date</span>
        </a>
        <div class="nav-profile">
            <a href="admin.html" id="adminMenuLink" class="admin-link" style="display: none; font-size: 0.8rem; color: #ffce00; margin-right: 15px; text-decoration: none; font-weight: bold;"><i class="ph-fill ph-crown"></i> 관리자 페이지</a>
            <span id="welcomeName" class="user-greeting">사용자님</span>
            <button id="logoutBtn" class="btn-icon" title="로그아웃"><i class="ph ph-sign-out"></i></button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        
        <!-- Welcome Section -->
        <header class="dashboard-header">
            <h1 id="mainTitle" class="page-title">프로필을 등록해주세요 <span class="title-accent">✨</span></h1>
            <p id="mainSubtitle" class="page-subtitle">매력적인 프로필은 성공적인 매칭의 첫걸음입니다.</p>
        </header>

        <!-- 알림 안내 배너 -->
        <div class="notice-banner">
            <i class="ph-fill ph-bell-ringing"></i>
            <span>현재 알림 기능이 없습니다. <strong>자주 접속</strong>하여 새로운 매칭 소식을 확인해주세요!</span>
        </div>

        <!-- Feature Cards Grid -->
        <div class="dashboard-grid">
            
            <!-- Today Views Card -->
            <div class="feature-card" id="viewsCard" onclick="handleViewsClick()" style="cursor: pointer;">
                <div class="card-badge" id="newViewBadge" style="display: none; background: #ffce00; color: #000;">! NEW</div>
                <div class="card-icon"><i class="ph-fill ph-eye"></i></div>
                <div class="card-content">
                    <h3>Today 프로필 조회수</h3>
                    <p>오늘 내 프로필을 확인한 사람들의 수입니다.</p>
                    <div style="font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 10px 0 2px 0;">
                        <span id="todayViewCount">0</span><span style="font-size: 1rem; color: var(--text-muted); margin-left: 5px;">명</span>
                    </div>
                    <div id="viewIncrMsg" style="font-size: 0.85rem; color: #ffce00; font-weight: bold; visibility: hidden; margin-bottom: 10px;">
                        조회수가 올라갔습니다!
                    </div>
                </div>
                <button class="btn-action secondary">상세 정보 (준비 중)</button>
            </div>

            <!-- Profile Card -->
            <div class="feature-card">
                <div class="card-icon" style="color: #FF4D6D;"><i class="ph-fill ph-heart-straight"></i></div>
                <div class="card-content">
                    <h3>새로운 인연 찾기</h3>
                    <p>나와 잘 어울리는 상대를 탐색하고 신청 현황을 확인하세요.</p>
                </div>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button id="btnFindDate" class="btn-action" onclick="window.location.href='find_date.html'" style="flex: 1; padding: 12px; font-size: 0.95rem;">인연 찾기</button>
                    <button id="btnMatchStatus" class="btn-action secondary" onclick="window.location.href='match_status.html'" style="flex: 1; padding: 12px; font-size: 0.95rem;">신청 관리</button>
                </div>
            </div>

            <!-- 2. 프로필 관리 카드 (2개 버튼) -->
            <div class="feature-card">
                <div class="card-icon"><i class="ph-fill ph-user-circle"></i></div>
                <div class="card-content">
                    <h3 id="profileCardTitle">내 프로필 관리</h3>
                    <p id="profileCardDesc">나의 매력을 보여줄 수 있는 프로필을 관리하세요.</p>
                </div>
                <div id="profileActionArea" style="display: flex; gap: 10px; width: 100%;">
                    <button class="btn-action" onclick="window.location.href='profile.html'">프로필 등록하기</button>
                </div>
            </div>

        </div>

    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
