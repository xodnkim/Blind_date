<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 우리만의 아지트</title>
    <meta name="description" content="친구들과 함께 즐기는 트렌디한 블라인드 데이트.">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Background Trendy Elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="brand" style="text-decoration: none; color: inherit; display: block;">
                <div class="logo-icon"><i class="ph-fill ph-heart"></i></div>
                <h1 class="logo">Blind <span>Date</span></h1>
            </a>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>자동 로그인</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">로그인</button>
            </form>

            <div class="signup-link">
                처음이신가요? <a href="signup.html">회원가입 요청하기</a>
            </div>
        </div>
        
        <footer class="footer-simple">
            &copy; 2026 Blind Date.
        </footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
