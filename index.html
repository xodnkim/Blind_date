<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 당신의 운명적인 인연을 찾아서</title>
    <meta name="description" content="고급스러운 프리미엄 블라인드 데이트 서비스. 조건보다는 취향, 외모보다는 깊이 있는 대화로 시작하세요.">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Blind Date</div>
            <nav>
                <ul>
                    <li><a href="#about">서비스 소개</a></li>
                    <li><a href="#story">성공 스토리</a></li>
                    <li><a href="#premium">프리미엄</a></li>
                </ul>
            </nav>
            <div class="header-btns">
                <a href="#" class="btn btn-outline" style="padding: 10px 25px;">로그인</a>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="hero-content">
                    <h1 class="hero-title">
                        가장 <span>비밀스럽고</span><br>
                        완벽한 만남
                    </h1>
                    <p class="hero-desc">
                        조건에 맞춘 기계적인 매칭이 아닌,<br>
                        당신의 가치관과 취향을 분석하여 깊이 있는 연결을 만들어냅니다.
                    </p>
                    <div class="cta-group">
                        <a href="signup.html" class="btn btn-primary">지금 시작하기</a>
                        <a href="#about" class="btn btn-outline">더 알아보기</a>
                    </div>
                </div>

                <div class="hero-visual">
                    <div class="main-card">
                        <div class="card-img">
                            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Matching Profile">
                        </div>
                        <div class="card-info">
                            <h3>오늘의 추천 인연</h3>
                            <p>27세, 건축가, 클래식 음악을 좋아하는 분</p>
                        </div>
                        
                        <!-- Floating Micro-animations -->
                        <i class="ph-fill ph-heart floating-heart" style="top: -20px; right: 20px; font-size: 2rem;"></i>
                        <i class="ph-fill ph-sparkle floating-heart" style="bottom: 50px; left: -10px; color: var(--accent-gold); font-size: 1.5rem; animation-delay: 0.5s;"></i>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
