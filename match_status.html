<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 매칭 현황</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-section {
            margin-bottom: 40px;
        }

        .status-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .match-item.success {
            border-color: #ffce00;
            background: rgba(255, 206, 0, 0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .user-details h4 {
            margin: 0;
            font-size: 1rem;
        }

        .user-details p {
            margin: 2px 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .match-status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .badge-success { background: #ffce00; color: #000; font-weight: bold; }
        .badge-pending { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="dashboard-body">

    <div class="bg-blob blob-2" style="bottom: 0; left: 0; opacity: 0.2;"></div>
    
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-heart"></i>
            <span>Blind Date</span>
        </a>
        <div class="nav-profile">
            <a href="main.html" class="btn-icon" title="뒤로 가기" style="font-size: 1rem; margin-right: 10px; font-weight: bold; text-decoration: none;">뒤로가기</a>
        </div>
    </nav>

    <main class="main-container">
        <header class="dashboard-header">
            <h1 class="page-title">매칭 신청 현황 💖</h1>
            <p class="page-subtitle">서로 신청이 완료되면 연락처가 공개됩니다.</p>
        </header>

        <div id="loadingArea" style="text-align: center; padding: 50px;">
            <i class="ph-fill ph-spinner ph-spin" style="font-size: 2rem; color: var(--primary);"></i>
        </div>

        <div id="statusContent" style="display: none;">
            
            <!-- 1. Matched Couples -->
            <section class="status-section">
                <h3 class="status-title"><i class="ph-fill ph-hands-clapping"></i> 매칭 성공!</h3>
                <div class="match-list" id="matchedList">
                    <!-- Loaded via JS -->
                </div>
            </section>

            <!-- 2. Received Requests -->
            <section class="status-section">
                <h3 class="status-title"><i class="ph-fill ph-heart-straight"></i> 나를 선택한 분들</h3>
                <div class="match-list" id="receivedList">
                    <!-- Loaded via JS -->
                </div>
            </section>

            <!-- 3. Sent Requests -->
            <section class="status-section">
                <h3 class="status-title"><i class="ph-fill ph-paper-plane-tilt"></i> 내가 보낸 신청</h3>
                <div class="match-list" id="sentList">
                    <!-- Loaded via JS -->
                </div>
            </section>

        </div>

    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
