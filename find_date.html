<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 인연 탐색</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .member-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .member-photo-blur {
            width: 100%;
            height: 300px;
            background-color: #222;
            background-image: url('https://images.unsplash.com/photo-1511367461989-f85a21fda167?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60');
            background-size: cover;
            background-position: center;
            filter: blur(15px) grayscale(100%);
            opacity: 0.5;
        }

        .member-info {
            padding: 20px;
        }

        .member-name-age {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .member-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .member-tag {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            color: var(--text-muted);
        }

        .loading-container {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="bg-blob blob-1" style="top: 0; right: 0; opacity: 0.2;"></div>
    
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-heart"></i>
            <span>Blind Date</span>
        </a>
        <div class="nav-profile">
            <a href="main.html" class="btn-icon" title="뒤로 가기" style="font-size: 1rem; margin-right: 10px; font-weight: bold; text-decoration: none;">뒤로가기</a>
        </div>
    </nav>

    <main class="main-container">
        <header class="dashboard-header" style="margin-bottom: 20px;">
            <h1 class="page-title">새로운 인연 찾기 ✨</h1>
            <p class="page-subtitle">나와 잘 어울리는 상대를 탐색해보세요.</p>
        </header>

        <!-- 필터 섹션 (기능 2번) -->
        <section class="filter-section" style="margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <div class="filter-group" style="flex: 1; min-width: 120px;">
                    <label style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px;">지역</label>
                    <select id="filterLocation" style="width: 100%; background: #1a1a2e; color: white; border: 1px solid #333; border-radius: 6px; padding: 6px;">
                        <option value="">모든 지역</option>
                        <option value="서울">서울</option>
                        <option value="경기">경기</option>
                        <option value="인천">인천</option>
                        <option value="부산">부산</option>
                        <option value="대구">대구</option>
                        <option value="광주">광주</option>
                        <option value="대전">대전</option>
                        <option value="울산">울산</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 120px;">
                    <label style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px;">나이대</label>
                    <select id="filterAge" style="width: 100%; background: #1a1a2e; color: white; border: 1px solid #333; border-radius: 6px; padding: 6px;">
                        <option value="">모든 연령</option>
                        <option value="20">20대</option>
                        <option value="30">30대</option>
                        <option value="40">40대 이상</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 120px;">
                    <label style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px;">정렬</label>
                    <select id="filterSort" style="width: 100%; background: #1a1a2e; color: white; border: 1px solid #333; border-radius: 6px; padding: 6px;">
                        <option value="recent">최신순</option>
                        <option value="birth_asc">나이 적은순</option>
                        <option value="birth_desc">나이 많은순</option>
                    </select>
                </div>
                <button id="btnApplyFilter" class="btn-action" style="padding: 10px 20px; font-size: 0.9rem; margin-top: 18px;">적용</button>
            </div>
        </section>

        <div id="loadingArea" class="loading-container">
            <i class="ph-fill ph-spinner ph-spin" style="font-size: 2rem;"></i>
            <p>회원 목록을 불러오는 중...</p>
        </div>

        <div class="members-grid" id="membersGrid">
            <!-- Members will be loaded here -->
        </div>

        <div id="noMembersMsg" style="display: none; text-align: center; padding: 100px 0; color: var(--text-muted);">
            <i class="ph ph-user-circle-plus" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <p>현재 탐색 가능한 새로운 인연이 없습니다.</p>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
