<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 인연 탐색</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .member-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .member-photo-blur {
            width: 100%;
            height: 300px;
            background-color: #222;
            background-image: url('https://images.unsplash.com/photo-1511367461989-f85a21fda167?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60');
            background-size: cover;
            background-position: center;
            filter: blur(15px) grayscale(100%);
            opacity: 0.5;
        }

        .member-info {
            padding: 20px;
        }

        .member-name-age {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .member-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .member-tag {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            color: var(--text-muted);
        }

        .loading-container {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="bg-blob blob-1" style="top: 0; right: 0; opacity: 0.2;"></div>
    
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-heart"></i>
            <span>Blind Date</span>
        </a>
        <div class="nav-profile">
            <a href="main.html" class="btn-icon" title="뒤로 가기" style="font-size: 1rem; margin-right: 10px; font-weight: bold; text-decoration: none;">뒤로가기</a>
        </div>
    </nav>

    <main class="main-container">
        <header class="dashboard-header">
            <h1 class="page-title">새로운 인연 탐색 ✨</h1>
            <p class="page-subtitle">사진은 매칭 성공 시에만 공개됩니다.</p>
        </header>

        <div id="loadingArea" class="loading-container">
            <i class="ph-fill ph-spinner ph-spin" style="font-size: 2rem;"></i>
            <p>회원 목록을 불러오는 중...</p>
        </div>

        <div class="members-grid" id="membersGrid">
            <!-- Members will be loaded here -->
        </div>

        <div id="noMembersMsg" style="display: none; text-align: center; padding: 100px 0; color: var(--text-muted);">
            <i class="ph ph-user-circle-plus" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <p>현재 탐색 가능한 새로운 인연이 없습니다.</p>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
