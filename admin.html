<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 관리자 대시보드</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <!-- Background Trendy Elements -->
    <div class="bg-blob blob-1" style="top: -20%; right: -10%; opacity: 0.2;"></div>
    <div class="bg-blob blob-3" style="bottom: -20%; left: -10%; opacity: 0.2;"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-crown" style="color: #ffce00;"></i>
            <span>Admin Center</span>
        </a>
        <div class="nav-profile">
            <a href="main.html" class="btn-icon" title="메인으로" style="font-size: 1rem; margin-right: 10px; font-weight: bold; text-decoration: none;">메인으로</a>
            <span id="welcomeName" class="user-greeting">관리자님</span>
            <button id="logoutBtn" class="btn-icon" title="로그아웃"><i class="ph ph-sign-out"></i></button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        
        <header class="dashboard-header">
            <h1 class="page-title">회원 관리 👥</h1>
            <p class="page-subtitle">서비스를 이용 중인 모든 회원의 상세 정보를 관리하고 승인/정지할 수 있습니다.</p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="testTelegramBtn" class="btn-action secondary" style="max-width: 200px; font-size: 0.9rem; padding: 10px 20px;">텔레그램 테스트</button>
            </div>
        </header>

        <!-- Admin Table Card -->
        <div class="feature-card" style="width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px;">
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>연락처</th>
                            <th>추천인</th>
                            <th>상태</th>
                            <th>데이터 관리</th>
                            <th>승인 / 탈퇴</th>
                        </tr>
                    </thead>
                    <tbody id="adminUserList">
                        <!-- Users loaded here -->
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 20px;">로딩 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Admin Detail Modals (Feature 4) -->
    <div id="adminModalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
            <div class="modal-title" id="adminModalTitle">상세 기록 확인</div>
            <div id="adminModalBody" style="margin-top: 15px;">
                <!-- Content injected by JS -->
            </div>
            <div class="modal-actions" style="margin-top: 25px;">
                <button class="btn-action secondary" onclick="closeAdminModal()">닫기</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
