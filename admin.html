<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 관리자 대시보드</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <!-- Background Trendy Elements -->
    <div class="bg-blob blob-1" style="top: -20%; right: -10%; opacity: 0.2;"></div>
    <div class="bg-blob blob-3" style="bottom: -20%; left: -10%; opacity: 0.2;"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="main.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <i class="ph-fill ph-crown" style="color: #ffce00;"></i>
            <span>Admin Center</span>
        </a>
        <div class="nav-profile">
            <a href="main.html" class="btn-icon" title="메인으로" style="font-size: 1rem; margin-right: 10px; font-weight: bold; text-decoration: none;">메인으로</a>
            <span id="welcomeName" class="user-greeting">관리자님</span>
            <button id="logoutBtn" class="btn-icon" title="로그아웃"><i class="ph ph-sign-out"></i></button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        
        <header class="dashboard-header">
            <h1 class="page-title">회원 가입 승인 관리 👥</h1>
            <p class="page-subtitle">새로 가입을 요청한 회원들의 지인 정보를 확인하고 승인해주세요.</p>
        </header>

        <!-- Admin Table Card -->
        <div class="feature-card" style="width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px;">
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>연락처</th>
                            <th>추천인(지인)</th>
                            <th>가입일시</th>
                            <th>상태 / 관리</th>
                        </tr>
                    </thead>
                    <tbody id="adminUserList">
                        <!-- Users will be loaded here dynamically -->
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 20px;">로딩 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
