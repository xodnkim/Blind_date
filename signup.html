<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Date | 회원가입 요청</title>
    <meta name="description" content="친구들과 함께 즐기는 트렌디한 블라인드 데이트 가입하기.">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

    <!-- Background Trendy Elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="login-container">
        <div class="login-box" style="max-width: 500px;">
            <a href="index.html" class="brand" style="text-decoration: none; color: inherit; display: block;">
                <div class="logo-icon"><i class="ph-fill ph-user-plus"></i></div>
                <h1 class="logo">Join <span>Blind Date</span></h1>
            </a>

            <form id="signupForm">
                <div class="form-group">
                    <label for="signupId">아이디</label>
                    <input type="text" id="signupId" placeholder="영문/숫자 조합 12자 이내" maxlength="12" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">비밀번호</label>
                    <input type="password" id="signupPassword" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="signupName">이름</label>
                    <input type="text" id="signupName" placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="signupPhone">핸드폰 번호</label>
                    <input type="tel" id="signupPhone" placeholder="010-0000-0000" maxlength="13" required>
                </div>

                <div class="form-group">
                    <label for="signupReferrer">추천인 (지인)</label>
                    <input type="text" id="signupReferrer" placeholder="누구의 소개로 오셨나요?" required>
                </div>

                <div class="form-group terms-box">
                    <div class="terms-content">
                        [매칭 성사 시 약정]<br>
                        본 서비스를 통해 매칭이 최종 성사될 경우, 감사의 의미로 각 주선자에게 5만원 상당의 식사를 대접할 것을 약속합니다. 또한, 제공된 개인정보는 매칭 목적으로만 사용됨에 동의합니다.
                    </div>
                    <label class="remember-me">
                        <input type="checkbox" id="termsCheck" required>
                        <span>위 내용에 동의합니다.</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">회원가입 요청하기</button>
            </form>

            <div class="signup-link">
                이미 회원이신가요? <a href="index.html">로그인하러 가기</a>
            </div>
        </div>
        
        <footer class="footer-simple">
            &copy; 2026 Blind Date.
        </footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
